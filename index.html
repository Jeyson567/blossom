<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blossom Fitness Club — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/whatsapp-hub.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="login-page">
    <div class="login-card" id="main-card">
      <div class="login-logo">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <circle cx="32" cy="32" r="32" fill="#c9a227"/>
          <text x="32" y="42" text-anchor="middle" fill="#000" font-size="28" font-weight="bold" font-family="Inter, sans-serif">B</text>
        </svg>
        <h1 id="page-title">Blossom Fitness Club</h1>
        <p id="page-subtitle">Sistema de Gestión Profesional</p>
      </div>

      <!-- Asistente de configuración inicial (primer arranque) -->
      <div id="onboarding-panel" style="display:none;">
        <p style="font-size:0.875rem;color:var(--color-text-secondary);margin-bottom:1.5rem;line-height:1.6;text-align:center;">
          Bienvenido. Configure su cuenta de <strong style="color:var(--color-gold);">administrador</strong> para comenzar.
          El sistema creará automáticamente la configuración y los planes de membresía.
        </p>
        <form id="onboarding-form">
          <div class="form-group">
            <label class="form-label" for="ob-nombre">Nombre completo</label>
            <input type="text" id="ob-nombre" class="form-input" required placeholder="Administrador">
          </div>
          <div class="form-group">
            <label class="form-label" for="ob-email">Correo electrónico</label>
            <input type="email" id="ob-email" class="form-input" required placeholder="admin@blossomfitness.com">
          </div>
          <div class="form-group">
            <label class="form-label" for="ob-password">Contraseña</label>
            <input type="password" id="ob-password" class="form-input" required minlength="6" placeholder="Mínimo 6 caracteres">
          </div>
          <button type="submit" class="btn btn-primary login-btn" id="btn-onboarding">
            Crear sistema e ingresar
          </button>
        </form>
      </div>

      <!-- Login normal -->
      <form class="login-form" id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="correo@ejemplo.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="login-remember">
          <label>
            <input type="checkbox" id="remember" checked>
            Recordar sesión
          </label>
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="btn-login">
          Iniciar Sesión
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import {
      initAuth, login, getAuthErrorMessage, AuthError,
      getCurrentUserData, getLastAuthError, clearLastAuthError, resetAuthCache
    } from './js/auth.js';
    import { verificarEstadoSistema, crearAdministradorInicial } from './js/services/bootstrap.service.js';
    import { diagnosticarSistema } from './js/utils/diagnostics.js';

    console.log('[BFC Login] ─── INICIO ───');

    const loginForm = document.getElementById('login-form');
    const onboardingPanel = document.getElementById('onboarding-panel');

    function mostrarOnboarding() {
      console.log('[BFC Login] Mostrando configuración inicial');
      document.getElementById('page-title').textContent = 'Bienvenido a Blossom Fitness Club';
      document.getElementById('page-subtitle').textContent = 'Configuración inicial del sistema';
      loginForm.style.display = 'none';
      onboardingPanel.style.display = 'block';
    }

    function mostrarLogin() {
      loginForm.style.display = 'block';
      onboardingPanel.style.display = 'none';
    }

    // 1. Intentar sesión existente primero
    let user = null;
    let userData = null;
    try {
      user = await initAuth();
      userData = getCurrentUserData();
    } catch (error) {
      console.warn('[BFC Login] initAuth sin sesión válida:', error.message);
    }

    if (user && userData) {
      console.log('[BFC Login] Sesión activa detectada → app.html');
      window.location.href = 'app.html';
    } else {
    // 2. Consultar Firestore: ¿existe al menos un admin en usuarios?
    const estado = await verificarEstadoSistema();
    console.log('[BFC Login] Estado del sistema:', estado);

    if (estado.error) {
      document.querySelector('.login-card').insertAdjacentHTML('afterbegin', `
        <div style="background:rgba(234,179,8,0.12);border:1px solid rgba(234,179,8,0.35);border-radius:8px;padding:1rem;margin-bottom:1rem;font-size:0.8125rem;line-height:1.6;color:var(--color-text-secondary);">
          <strong style="color:var(--color-gold);">Aviso</strong><br>
          No se pudo verificar el estado del sistema. Si ya configuró el gimnasio, inicie sesión normalmente.
        </div>
      `);
    }

    if (estado.necesitaOnboarding) {
      mostrarOnboarding();
    } else {
      mostrarLogin();

      const lastErr = getLastAuthError();
      if (lastErr?.message) {
        document.querySelector('.login-card').insertAdjacentHTML('afterbegin', `
          <div style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);border-radius:8px;padding:1rem;margin-bottom:1rem;font-size:0.8125rem;line-height:1.6;color:var(--color-text-secondary);">
            <strong style="color:#ef4444;">Sesión anterior inválida</strong><br>${lastErr.message}
          </div>
        `);
        clearLastAuthError();
      }
    }
    } // fin else (sin sesión activa)

    document.getElementById('onboarding-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-onboarding');
      btn.disabled = true;
      btn.textContent = 'Configurando sistema...';

      const nombre = document.getElementById('ob-nombre').value.trim();
      const email = document.getElementById('ob-email').value.trim();
      const password = document.getElementById('ob-password').value;

      try {
        await crearAdministradorInicial({ nombre, email, password });
        resetAuthCache();
        await initAuth();

        await Swal.fire({
          icon: 'success',
          title: '¡Sistema listo!',
          text: 'Configuración, planes y administrador creados automáticamente.',
          confirmButtonColor: '#c9a227',
          background: '#1a1a1a',
          color: '#fff',
          timer: 2000,
          showConfirmButton: false
        });

        window.location.href = 'app.html';
      } catch (error) {
        console.error('[BFC Onboarding] ERROR:', error);
        let text = error.message;
        if (error.code === 'auth/email-already-in-use') {
          text = 'Este correo ya está registrado. El sistema ya fue configurado — use el inicio de sesión.';
          mostrarLogin();
        }
        Swal.fire({ icon: 'error', title: 'Error en configuración', text, background: '#1a1a1a', color: '#fff', confirmButtonColor: '#c9a227' });
      } finally {
        btn.disabled = false;
        btn.textContent = 'Crear sistema e ingresar';
      }
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const btnLogin = document.getElementById('btn-login');

      btnLogin.disabled = true;
      btnLogin.textContent = 'Iniciando...';

      try {
        await login(email, password, remember);
        window.location.href = 'app.html';
      } catch (error) {
        console.error('[BFC Login] Error:', error);
        await diagnosticarSistema();

        let title = 'Error de acceso';
        let message = error instanceof AuthError ? error.message : (error.code ? getAuthErrorMessage(error.code) : error.message);
        if (error instanceof AuthError && error.code === 'profile-missing') title = 'Perfil no configurado';

        Swal.fire({ icon: 'error', title, text: message, confirmButtonColor: '#c9a227', background: '#1a1a1a', color: '#fff' });
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Iniciar Sesión';
      }
    });
  </script>
</body>
</html>
